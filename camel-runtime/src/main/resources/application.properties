# Caravee Camel Runtime

# HTTP server port (agent uses 8100, Camel gets 8090)
quarkus.http.port=8090

# Observability — expose under /observe (matches our camel-url convention)
quarkus.management.enabled=true
quarkus.management.port=8090

# Health endpoints (default: /q/health, /q/health/live, /q/health/ready)
# We map to /observe/* to match our camel-url convention
quarkus.smallrye-health.root-path=/observe/health

# Metrics at /observe/metrics (Prometheus format)
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/observe/metrics

# Route discovery — watch /data/routes for YAML files (hot-reload)
camel.main.routes-include-pattern=file:/data/routes/*.yaml
camel.main.routes-reload-enabled=true
camel.main.routes-reload-directory=/data/routes

# Kamelet catalog from classpath
camel.component.kamelet.location=classpath:kamelets

# Observability
camel.metrics.enable-route-event-notifier=true
camel.metrics.enable-message-history=false

# OpenTelemetry (disabled by default, enable when needed)
quarkus.otel.sdk.disabled=true

# PostgreSQL datasource (optional — only used when postgresql-sink Kamelets are deployed)
# Configured via env vars: QUARKUS_DATASOURCE_JDBC_URL, QUARKUS_DATASOURCE_USERNAME, etc.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=false

# Log level
quarkus.log.level=INFO
quarkus.log.category."org.apache.camel".level=INFO
