name: Build Full Engine Image

on:
  push:
    branches: [main]
    paths:
      - 'camel-runtime/**'
      - 'Dockerfile.full'
      - 'entrypoint.sh'
      - 'cmd/**'
      - 'internal/**'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('camel-runtime/pom.xml') }}
          restore-keys: maven-

      - name: Build Go agent
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=$(git describe --tags --always --dirty)" \
            -o caravee-engine ./cmd/agent/

      - name: Build Camel Quarkus runtime
        working-directory: camel-runtime
        run: mvn package -DskipTests -q

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.full -t caravee-engine:full .
          docker tag caravee-engine:full ghcr.io/${{ github.repository_owner }}/caravee-engine:latest
          docker tag caravee-engine:full ghcr.io/${{ github.repository_owner }}/caravee-engine:${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/caravee-engine:latest
          docker push ghcr.io/${{ github.repository_owner }}/caravee-engine:${{ github.sha }}
          echo "✅ Image pushed: ghcr.io/${{ github.repository_owner }}/caravee-engine:latest"
