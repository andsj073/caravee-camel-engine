name: Build Agent Image

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile.agent'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build and test
        run: go build ./... && go vet ./...

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate build version (YYYY-MM-DD.run_number)
        id: version
        run: echo "BUILD_VERSION=$(date -u +%Y-%m-%d).${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agent
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.BUILD_VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/caravee-engine:agent
            ghcr.io/${{ github.repository_owner }}/caravee-engine:agent-${{ steps.version.outputs.BUILD_VERSION }}
