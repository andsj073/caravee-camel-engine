version: "3.9"

# Caravee Engine stack — our full image (Camel Quarkus + Go agent) + Postgres
#
# Usage:
#   $env:CARAVEE_CLOUD='https://cloud/api/v1/pairing/pair?otp=XXXX'
#   docker compose up -d

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: caravee
      POSTGRES_USER: caravee
      POSTGRES_PASSWORD: caravee
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caravee"]
      interval: 5s
      timeout: 3s
      retries: 10

  camel:
    image: ghcr.io/andsj073/caravee-camel-runtime:latest  # Apache Camel Quarkus — no Caravee code
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/caravee
      QUARKUS_DATASOURCE_USERNAME: caravee
      QUARKUS_DATASOURCE_PASSWORD: caravee
    volumes:
      - engine-data:/data
      - ${CARAVEE_DATA_PATH:-./data}:/mnt/caravee   # mount host dirs here, e.g. /mnt/caravee/orders
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/observe/health/live"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  agent:
    image: ghcr.io/andsj073/caravee-engine:agent   # Caravee agent — open source, auditable
    restart: unless-stopped
    user: "0"  # run as root so it can write to the volume
    depends_on:
      - postgres  # camel is optional — agent works without sidecar (graceful degradation)
    environment:
      CARAVEE_CLOUD: ${CARAVEE_CLOUD}
      CARAVEE_CAMEL_URL: http://camel:8090
      CARAVEE_DATA_DIR: /data
      CARAVEE_ROUTES_DIR: /data/routes
      CARAVEE_LOG_LEVEL: ${CARAVEE_LOG_LEVEL:-info}
    volumes:
      - engine-data:/data
    command:
      - -data-dir=/data
      - -routes-dir=/data/routes
      - -camel-url=http://camel:8090

volumes:
  postgres-data:
  engine-data:
