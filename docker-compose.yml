version: "3.9"

# Caravee Engine stack — our full image (Camel Quarkus + Go agent) + Postgres
#
# Usage:
#   $env:CARAVEE_CLOUD='https://cloud/api/v1/pairing/pair?otp=XXXX'
#   docker compose up -d

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: caravee
      POSTGRES_USER: caravee
      POSTGRES_PASSWORD: caravee
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caravee"]
      interval: 5s
      timeout: 3s
      retries: 10

  engine:
    image: ghcr.io/andsj073/caravee-engine:latest   # Camel Quarkus + Go agent, built by CI
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CARAVEE_CLOUD: ${CARAVEE_CLOUD}
      CARAVEE_LOG_LEVEL: ${CARAVEE_LOG_LEVEL:-info}
      CARAVEE_CAMEL_URL: http://localhost:8090
      CARAVEE_DATA_DIR: /data
      CARAVEE_ROUTES_DIR: /data/routes
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/caravee
      QUARKUS_DATASOURCE_USERNAME: caravee
      QUARKUS_DATASOURCE_PASSWORD: caravee
    volumes:
      - engine-data:/data
    network_mode: host

volumes:
  postgres-data:
  engine-data:
